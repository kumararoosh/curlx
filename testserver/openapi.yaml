openapi: "3.0.3"
info:
  title: curlx Test Server
  description: A simple REST API for verifying curlx functionality.
  version: "1.0.0"

servers:
  - url: http://localhost:9090

paths:
  /auth/login:
    post:
      operationId: login
      summary: Obtain a bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /books:
    get:
      operationId: listBooks
      summary: List all books
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      summary: Create a new book
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      summary: Get a book by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
    put:
      operationId: updateBook
      summary: Update a book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Updated book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
    delete:
      operationId: deleteBook
      summary: Delete a book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "test-token-abc123"

    BookInput:
      type: object
      required: [title, author]
      properties:
        title:
          type: string
          example: "The Go Programming Language"
        author:
          type: string
          example: "Alan Donovan"
        year:
          type: integer
          example: 2015

    Book:
      allOf:
        - $ref: "#/components/schemas/BookInput"
        - type: object
          properties:
            id:
              type: string
              example: "1"
